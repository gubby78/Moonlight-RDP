name: Deeplink Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Tải và cài Deeplink
        run: |
          # Link trực tiếp từ server download chính thức 117MB
          curl -L -o deeplink-setup.exe "https://download.deeplink.cloud/DeeplinkSetup.exe"
          $size = (Get-Item deeplink-setup.exe).Length
          Write-Host "File size: $size bytes"
          if ($size -lt 1000000) {
            Write-Host "File quá nhỏ, thử link khác..."
            curl -L -o deeplink-setup.exe "https://download.deeplink.cloud/1.0.3.1/DeepLink_Setup_win64_1.0.3.1.exe"
          }
          Start-Process -FilePath "deeplink-setup.exe" -ArgumentList "/S" -Wait
          Start-Sleep -Seconds 15
          Write-Host "Deeplink đã cài xong!"

      - name: Khởi động Deeplink và lấy ID
        run: |
          Start-Process "C:\Program Files\DeepLink\DeepLink.exe" -NoNewWindow
          Start-Sleep -Seconds 20
          $id = (Get-ItemProperty -Path "HKCU:\Software\DeepLink" -Name "DeviceID" -ErrorAction SilentlyContinue).DeviceID
          $pass = (Get-ItemProperty -Path "HKCU:\Software\DeepLink" -Name "Password" -ErrorAction SilentlyContinue).Password
          Write-Host "=========================================="
          Write-Host "DEEPLINK ID: $id"
          Write-Host "DEEPLINK PASSWORD: $pass"
          Write-Host "=========================================="

      - name: Giữ session sống
        run: |
          Start-Sleep -Seconds 21600
