name: Sunshine Stream

on:
  workflow_dispatch:  # Chạy thủ công khi cần

jobs:
  stream:
    runs-on: windows-latest
    timeout-minutes: 360  # Tối đa 6 tiếng

    steps:
      - name: Kết nối Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: --accept-routes

      - name: Tải và cài Sunshine
        run: |
          $url = "https://github.com/LizardByte/Sunshine/releases/latest/download/sunshine-windows-installer.exe"
          Invoke-WebRequest -Uri $url -OutFile "sunshine-installer.exe"
          Start-Process -FilePath "sunshine-installer.exe" -ArgumentList "/S" -Wait

      - name: Cấu hình Sunshine
        run: |
          $configPath = "$env:APPDATA\Sunshine\sunshine.conf"
          @"
          encoder=software
          username=${{ secrets.SUNSHINE_USER }}
          password=${{ secrets.SUNSHINE_PASS }}
          "@ | Out-File -FilePath $configPath -Encoding utf8

      - name: Khởi động Sunshine
        run: |
          Start-Process "C:\Program Files\Sunshine\sunshine.exe"
          Start-Sleep -Seconds 5
          Write-Host "Sunshine đã chạy!"

      - name: Giữ session sống
        run: |
          Write-Host "Đang chạy... Vào Moonlight để kết nối!"
          # Lấy IP Tailscale để kết nối
          tailscale ip -4
          # Giữ cho workflow không tắt
          Start-Sleep -Seconds 21600
