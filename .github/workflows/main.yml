name: Sunshine Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Cài Tailscale
        run: |
          curl -L -o tailscale-setup.exe "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe"
          Start-Process -FilePath "tailscale-setup.exe" -ArgumentList "/S" -Wait
          Start-Sleep -Seconds 5

      - name: Đăng nhập Tailscale
        run: |
          Start-Process "C:\Program Files\Tailscale\tailscale.exe" -ArgumentList "up" -NoNewWindow
          Start-Sleep -Seconds 3
          Write-Host "=== BẤM LINK ĐỂ ĐĂNG NHẬP TAILSCALE ==="
          Start-Sleep -Seconds 60
        continue-on-error: true

      - name: Cài Virtual Display Driver
        run: |
          # Tải virtual display driver
          curl -L -o vdd.zip "https://github.com/itsmikethetech/Virtual-Display-Driver/releases/download/24.12.13/IddSampleDriver.zip"
          Expand-Archive -Path vdd.zip -DestinationPath "C:\vdd"
          
          # Cài driver
          $cert = "C:\vdd\IddSampleDriver\IddSampleDriver.cer"
          Import-Certificate -FilePath $cert -CertStoreLocation "Cert:\LocalMachine\TrustedPublisher"
          Import-Certificate -FilePath $cert -CertStoreLocation "Cert:\LocalMachine\Root"
          pnputil /add-driver "C:\vdd\IddSampleDriver\IddSampleDriver.inf" /install
          Start-Sleep -Seconds 5
          Write-Host "Virtual Display đã cài xong!"

      - name: Bật RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -value 0
          $username = $env:USERNAME
          net user $username "Admin123!"
          Write-Host "Username RDP: $username"
          Write-Host "Password RDP: Admin123!"

      - name: Tải và cài Sunshine
        run: |
          curl -L -o sunshine-installer.exe "https://github.com/LizardByte/Sunshine/releases/download/v0.23.1/sunshine-windows-installer.exe"
          Start-Process -FilePath "sunshine-installer.exe" -ArgumentList "/S" -Wait
          Start-Sleep -Seconds 10

      - name: Cấu hình và khởi động Sunshine
        run: |
          netsh advfirewall firewall add rule name="Sunshine TCP" dir=in action=allow protocol=TCP localport=47990
          netsh advfirewall firewall add rule name="Sunshine UDP" dir=in action=allow protocol=UDP localport=47998-48010
          netsh advfirewall firewall add rule name="Sunshine TCP 2" dir=in action=allow protocol=TCP localport=48010

          $configDir = "$env:APPDATA\Sunshine"
          New-Item -ItemType Directory -Force -Path $configDir
          @"
          encoder=software
          capture=wgc
          username=admin
          password=admin123
          "@ | Out-File "$configDir\sunshine.conf" -Encoding utf8

          Start-Process "C:\Program Files\Sunshine\sunshine.exe"
          Start-Sleep -Seconds 10

          $process = Get-Process sunshine -ErrorAction SilentlyContinue
          if ($process) {
            Write-Host "Sunshine đang chạy!"
          } else {
            Write-Host "Sunshine CHƯA chạy!"
          }

      - name: Hiện thông tin kết nối
        run: |
          $ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          $username = $env:USERNAME
          Write-Host "=========================================="
          Write-Host "CÁCH 1 - RDP:"
          Write-Host "IP: $ip"
          Write-Host "Username: $username"
          Write-Host "Password: Admin123!"
          Write-Host "------------------------------------------"
          Write-Host "CÁCH 2 - MOONLIGHT:"
          Write-Host "IP Tailscale: $ip"
          Write-Host "Vào trình duyệt: https://$($ip):47990"
          Write-Host "Username Sunshine: admin"
          Write-Host "Password Sunshine: admin123"
          Write-Host "Vào tab PIN -> nhập PIN từ Moonlight"
          Write-Host "=========================================="

      - name: Giữ session sống
        run: |
          Start-Sleep -Seconds 21600
