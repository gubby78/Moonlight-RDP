name: Deeplink Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Tải và cài Deeplink
        run: |
          curl -L -o deeplink-setup.exe "https://www.deeplink.cloud/software/DeeplinkSetup.exe"
          Start-Process -FilePath "deeplink-setup.exe" -ArgumentList "/S" -Wait
          Start-Sleep -Seconds 10
          Write-Host "Deeplink đã cài xong!"

      - name: Khởi động Deeplink và lấy ID
        run: |
          Start-Process "C:\Program Files\Deeplink\Deeplink.exe" -NoNewWindow
          Start-Sleep -Seconds 15
          Write-Host "=========================================="
          Write-Host "Deeplink đang chạy!"
          Write-Host "Mở app Deeplink trên điện thoại"
          Write-Host "Bấm kết nối -> nhập ID hiển thị trên đây"
          Write-Host "=========================================="

      - name: Giữ session sống
        run: |
          Start-Sleep -Seconds 21600
