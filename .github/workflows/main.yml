name: Sunshine Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Cài và kết nối Tailscale
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "tailscale-setup.exe"
          Start-Process -FilePath "tailscale-setup.exe" -ArgumentList "/S" -Wait
          Start-Sleep -Seconds 5
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --accept-routes
          & "C:\Program Files\Tailscale\tailscale.exe" ip -4

      - name: Tải và cài Sunshine
        run: |
          $url = "https://github.com/LizardByte/Sunshine/releases/latest/download/sunshine-windows-installer.exe"
          Invoke-WebRequest -Uri $url -OutFile "sunshine-installer.exe"
          Start-Process -FilePath "sunshine-installer.exe" -ArgumentList "/S" -Wait

      - name: Khởi động Sunshine
        run: |
          Start-Process "C:\Program Files\Sunshine\sunshine.exe"
          Start-Sleep -Seconds 5
          Write-Host "Sunshine đã chạy!"

      - name: Giữ session sống
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          Start-Sleep -Seconds 21600
