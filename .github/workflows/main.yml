name: Sunshine Stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Cài Tailscale
        run: |
          curl -L -o tailscale-setup.exe "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe"
          Start-Process -FilePath "tailscale-setup.exe" -ArgumentList "/S" -Wait
          Start-Sleep -Seconds 5

      - name: Đăng nhập Tailscale
        run: |
          Start-Process "C:\Program Files\Tailscale\tailscale.exe" -ArgumentList "up" -NoNewWindow
          Start-Sleep -Seconds 3
          Write-Host "=== BẤM LINK ĐỂ ĐĂNG NHẬP TAILSCALE ==="
          Start-Sleep -Seconds 60
        continue-on-error: true

      - name: Tải và cài Sunshine
        run: |
          curl -L -o sunshine-installer.exe "https://github.com/LizardByte/Sunshine/releases/download/v0.23.1/sunshine-windows-installer.exe"
          Start-Process -FilePath "sunshine-installer.exe" -ArgumentList "/S" -Wait
          Start-Sleep -Seconds 10

      - name: Cấu hình Sunshine
        run: |
          $configDir = "$env:APPDATA\Sunshine"
          New-Item -ItemType Directory -Force -Path $configDir
          @"
          encoder=software
          username=admin
          password=admin123
          "@ | Out-File "$configDir\sunshine.conf" -Encoding utf8

      - name: Khởi động Sunshine
        run: |
          Start-Process "C:\Program Files\Sunshine\sunshine.exe"
          Start-Sleep -Seconds 10

      - name: Hiện IP để kết nối
        run: |
          $ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          Write-Host "=========================================="
          Write-Host "IP TAILSCALE: $ip"
          Write-Host "Vào trình duyệt điện thoại gõ: https://$($ip):47990"
          Write-Host "Username: admin"
          Write-Host "Password: admin123"
          Write-Host "Vào tab PIN -> nhập PIN từ Moonlight"
          Write-Host "=========================================="

      - name: Giữ session sống
        run: |
          Start-Sleep -Seconds 21600
